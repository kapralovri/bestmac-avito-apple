name: Avito Scanner v2

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/hot-deals-scanner/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/hot-deals-scanner/requirements.txt

      - name: Run scanner v2
        env:
          TELEGRAM_NOTIFY_URL: ${{ secrets.TELEGRAM_NOTIFY_URL }}
          RUCAPTCHA_API_KEY: ${{ secrets.RUCAPTCHA_API_KEY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          CHANGE_IP_URL: ${{ secrets.CHANGE_IP_URL }}
        run: python scripts/hot-deals-scanner/scanner_v2.py

      - name: Save seen history
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/seen-hot-deals.json public/data/price-history.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update seen hot deals [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
