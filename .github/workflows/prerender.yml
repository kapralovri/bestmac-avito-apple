name: Update prerender cache

on:
  workflow_run:
    workflows: ["Vercel Production Deployment"]
    types: [completed]

jobs:
  prerender:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: npm ci
      - run: npm run prerender
      - run: |
          git config user.email "bot@bestmac.ru"
          git config user.name "prerender-bot"
          git add api/prerendered/
          git diff --staged --quiet || git commit -m "chore: update prerender cache [skip ci]"
          git push

