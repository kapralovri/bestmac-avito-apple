name: Prerender HTML and commit

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Базовый URL для пререндеринга (по умолчанию https://bestmac.ru)"
        required: false

jobs:
  prerender:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run prerender script
        env:
          PRERENDER_BASE_URL: ${{ inputs.base_url || 'https://bestmac.ru' }}
        run: npm run prerender

      - name: Commit prerendered HTML
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update prerendered HTML"
          file_pattern: api/prerendered/*.html

