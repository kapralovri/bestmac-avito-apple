name: Avito Price Parser v2

on:
  schedule:
    - cron: '0 1 * * *'   # MacBook
    - cron: '0 7 * * *'   # iMac
    - cron: '0 13 * * *'  # Mac mini
    - cron: '0 19 * * *'  # Mac Studio
  workflow_dispatch:
    inputs:
      tab:
        description: 'Вкладка'
        default: 'MacBook'
        type: choice
        options:
          - MacBook
          - iMac
          - Mac mini
          - Mac Studio
          - all
      max_pages:
        description: 'Макс. страниц поиска на строку'
        default: '5'
        type: string
      clean:
        description: 'Очистить записи этих семейств перед парсингом'
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/avito-parser/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scripts/avito-parser/requirements.txt
          playwright install chromium --with-deps

      - name: Sync Google Sheet
        run: python scripts/sync-google-sheet.py

      - name: Run parser
        env:
          RUCAPTCHA_API_KEY: ${{ secrets.RUCAPTCHA_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAB="${{ github.event.inputs.tab }}"
            MAX_PAGES="${{ github.event.inputs.max_pages }}"
            CLEAN_FLAG=""
            if [ "${{ github.event.inputs.clean }}" = "true" ]; then
              CLEAN_FLAG="--clean"
            fi
          else
            case "${{ github.event.schedule }}" in
              "0 1 * * *")  TAB="MacBook" ;;
              "0 7 * * *")  TAB="iMac" ;;
              "0 13 * * *") TAB="Mac mini" ;;
              "0 19 * * *") TAB="Mac Studio" ;;
              *)            TAB="MacBook" ;;
            esac
            MAX_PAGES="5"
            CLEAN_FLAG=""
          fi

          echo "Schedule: ${{ github.event.schedule }}"
          echo "Tab: $TAB | max-pages: $MAX_PAGES | clean: $CLEAN_FLAG"
          python scripts/avito-parser/parser.py --tab "$TAB" --max-pages "$MAX_PAGES" --time-limit 340 $CLEAN_FLAG

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/avito-prices.json public/data/avito-urls.json public/data/parser-config.json
          git diff --staged --quiet && echo "No changes" && exit 0

          case "${{ github.event.schedule }}" in
            "0 1 * * *")  LABEL=" [MacBook]" ;;
            "0 7 * * *")  LABEL=" [iMac]" ;;
            "0 13 * * *") LABEL=" [Mac mini]" ;;
            "0 19 * * *") LABEL=" [Mac Studio]" ;;
            *)            LABEL="" ;;
          esac

          git commit -m "chore: update prices${LABEL} [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Retry $i..."
            git rebase --abort 2>/dev/null || true
            git fetch origin main
            git reset --soft origin/main
            git commit -m "chore: update prices${LABEL} [skip ci]"
          done
