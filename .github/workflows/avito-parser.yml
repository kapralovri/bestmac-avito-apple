name: Avito Price Parser

on:
  schedule:
    - cron: '0 2 */2 * *'   # каждые 2 дня в 2:00 UTC (ночью)

  workflow_dispatch:
    inputs:
      batch:
        description: 'Батч (1-3) или "all"'
        default: 'all'
        type: choice
        options: ['all', '1', '2', '3']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Determine batch
        id: batch_step
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "batch=${{ github.event.inputs.batch }}" >> $GITHUB_OUTPUT
          else
            echo "batch=all" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/avito-parser/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scripts/avito-parser/requirements.txt
          playwright install chromium --with-deps

      - name: Sync Google Sheets
        run: python scripts/sync-google-sheet.py

      - name: Run parser
        env:
          BATCH: ${{ steps.batch_step.outputs.batch }}
          RUCAPTCHA_API_KEY: ${{ secrets.RUCAPTCHA_API_KEY }}
        run: |
          cd scripts/avito-parser
          python parser.py --batch $BATCH --total-batches 3

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/avito-urls.json public/data/avito-prices.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update prices batch ${{ steps.batch_step.outputs.batch }} [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Retry $i: rebase conflict, resetting..."
            git rebase --abort 2>/dev/null || true
            git fetch origin main
            git reset --soft origin/main
            git commit -m "chore: update prices batch ${{ steps.batch_step.outputs.batch }} [skip ci]"
          done
