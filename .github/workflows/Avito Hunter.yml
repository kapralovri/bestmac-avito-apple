name: Avito Scanner Auto

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/hot-deals-scanner/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/hot-deals-scanner/requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run scanner
        env:
          SCAN_URL: ${{ secrets.SCAN_URL }}
          TELEGRAM_NOTIFY_URL: ${{ secrets.TELEGRAM_NOTIFY_URL }}
          RUCAPTCHA_API_KEY: ${{ secrets.RUCAPTCHA_API_KEY }}
        run: python scripts/hot-deals-scanner/scanner.py

      - name: Save seen history
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/seen-hot-deals.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update seen hot deals [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
