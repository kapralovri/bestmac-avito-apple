name: Price Builder v2

on:
  schedule:
    - cron: '0 3 * * *'   # ежедневно в 3:00 UTC (6:00 МСК)
  workflow_dispatch:
    inputs:
      url:
        description: 'Кастомный URL (пусто = BUILDER_URLS из config.py)'
        default: ''
        type: string
      max_pages:
        description: 'Макс. страниц'
        default: '3'
        type: string
      clean:
        description: 'Чистый запуск (не мержить с существующей базой)'
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/price-builder/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scripts/price-builder/requirements.txt
          playwright install chromium --with-deps

      - name: Run Price Builder v2
        env:
          RUCAPTCHA_API_KEY: ${{ secrets.RUCAPTCHA_API_KEY }}
        run: |
          cd scripts/price-builder
          CUSTOM_URL="${{ github.event.inputs.url }}"
          MAX_PAGES="${{ github.event.inputs.max_pages || '3' }}"
          CLEAN="${{ github.event.inputs.clean }}"

          CMD="python builder.py --max-pages $MAX_PAGES"
          if [ -n "$CUSTOM_URL" ]; then
            CMD="$CMD --url \"$CUSTOM_URL\""
          fi
          if [ "$CLEAN" = "true" ]; then
            CMD="$CMD --clean"
          fi

          echo "Running: $CMD"
          eval $CMD

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/avito-prices.json public/data/avito-urls.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update prices (builder v2) [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Retry $i..."
            git rebase --abort 2>/dev/null || true
            git fetch origin main
            git reset --soft origin/main
            git commit -m "chore: update prices (builder v2) [skip ci]"
          done
