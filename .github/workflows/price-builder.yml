name: Price Builder v3 (disabled — replaced by avito-parser.yml)

on:
  workflow_dispatch:
    inputs:
      models:
        description: 'Модель (одна) или "— все модели —"'
        default: '— все модели —'
        type: choice
        options:
          - '— все модели —'
          - 'MacBook Air 13 (2020, M1)'
          - 'MacBook Air 13 (2022, M2)'
          - 'MacBook Pro 13 (2020, M1)'
          - 'MacBook Pro 14 (2021)'
          - 'MacBook Pro 16 (2021)'
          - 'MacBook Pro 13 (2022, M2)'
          - 'MacBook Air 15 (2023, M2)'
          - 'MacBook Pro 14 (2023)'
          - 'MacBook Pro 16 (2023)'
          - 'MacBook Air 13 (2024, M3)'
          - 'MacBook Air 15 (2024, M3)'
          - 'MacBook Pro 14 (2024)'
          - 'MacBook Pro 16 (2024)'
          - 'MacBook Air 13 (2025, M4)'
          - 'MacBook Air 15 (2025, M4)'
          - 'MacBook Pro 14 (2025)'
          - 'MacBook Pro 16 (2026, M5 Pro)'
          - 'Macbook Air 13 (2026, M5)'
          - 'Macbook Air 15 (2026, M5)'
          - 'imac 24 m1'
          - 'imac 24 m3'
          - 'imac 24 m4'
          - 'Imac 27 2020'
          - 'Imac 27 2019'
          - 'Imac 27 2017'
          - 'Mac Studio m1'
          - 'Mac Studio m2'
          - 'Mac Studio m3'
          - 'Mac Studio m4'
          - 'mac mini m1'
          - 'mac mini m2'
          - 'mac mini m4'
      family:
        description: 'Семейства из Sheets через пробел (MacBook iMac "Mac mini" "Mac Studio") или пусто = все'
        default: ''
        type: string
      max_pages:
        description: 'Макс. страниц на модель'
        default: '15'
        type: string
      clean:
        description: 'Пересоздать базу с нуля (--clean)'
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/price-builder/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scripts/price-builder/requirements.txt
          playwright install chromium --with-deps

      - name: Sync models from Google Sheets
        run: python scripts/sync-google-sheet.py

      - name: Run Price Builder v3
        env:
          RUCAPTCHA_API_KEY: ${{ secrets.RUCAPTCHA_API_KEY }}
        run: |
          cd scripts/price-builder
          MAX_PAGES="${{ github.event.inputs.max_pages || '15' }}"
          CLEAN=""
          if [ "${{ github.event.inputs.clean }}" = "true" ]; then
            CLEAN="--clean"
          fi

          # Определяем семейство: из ручного запуска или по расписанию
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FAMILY="${{ github.event.inputs.family }}"
          elif [ "${{ github.event.schedule }}" = "0 2 * * *" ]; then
            FAMILY="MacBook"
          elif [ "${{ github.event.schedule }}" = "0 8 * * *" ]; then
            FAMILY="iMac Mac mini Mac Studio"
          else
            FAMILY=""
          fi

          ARGS="--max-pages $MAX_PAGES --time-limit 340 $CLEAN"

          MODELS="${{ github.event.inputs.models }}"
          if [ -n "$MODELS" ] && [ "$MODELS" != "— все модели —" ]; then
            ARGS="$ARGS --models \"$MODELS\""
          fi
          if [ -n "$FAMILY" ]; then
            ARGS="$ARGS --family $FAMILY"
          fi

          echo "Schedule: ${{ github.event.schedule }}"
          echo "Running: python builder.py $ARGS"
          python builder.py $ARGS

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/avito-prices.json public/data/avito-urls.json public/data/models-config.json
          git diff --staged --quiet && echo "No changes" && exit 0
          BATCH_LABEL=""
          if [ "${{ github.event.schedule }}" = "0 2 * * *" ]; then
            BATCH_LABEL=" [MacBook]"
          elif [ "${{ github.event.schedule }}" = "0 8 * * *" ]; then
            BATCH_LABEL=" [iMac/mini/Studio]"
          fi
          git commit -m "chore: update prices (builder v3)${BATCH_LABEL} [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Retry $i..."
            git rebase --abort 2>/dev/null || true
            git fetch origin main
            git reset --soft origin/main
            git commit -m "chore: update prices (builder v3)${BATCH_LABEL} [skip ci]"
          done
