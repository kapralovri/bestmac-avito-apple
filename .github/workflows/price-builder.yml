name: Price Builder v2

on:
  schedule:
    - cron: '0 2 */2 * *'   # каждые 2 дня в 2:00 UTC
  workflow_dispatch:
    inputs:
      families:
        description: 'Семейства (через пробел) или пусто = все'
        default: ''
        type: string
      max_pages:
        description: 'Макс. страниц на семейство'
        default: '15'
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/price-builder/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scripts/price-builder/requirements.txt
          playwright install chromium --with-deps

      - name: Run Price Builder v2
        env:
          RUCAPTCHA_API_KEY: ${{ secrets.RUCAPTCHA_API_KEY }}
        run: |
          cd scripts/price-builder
          FAMILIES="${{ github.event.inputs.families }}"
          MAX_PAGES="${{ github.event.inputs.max_pages || '15' }}"
          if [ -n "$FAMILIES" ]; then
            python builder.py --families $FAMILIES --max-pages $MAX_PAGES
          else
            python builder.py --max-pages $MAX_PAGES
          fi

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/avito-prices.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update prices (builder v2) [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Retry $i..."
            git rebase --abort 2>/dev/null || true
            git fetch origin main
            git reset --soft origin/main
            git commit -m "chore: update prices (builder v2) [skip ci]"
          done
