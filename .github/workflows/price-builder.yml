name: Price Builder v3

on:
  schedule:
    - cron: '0 3 * * *'   # ежедневно в 03:00 UTC
  workflow_dispatch:
    inputs:
      models:
        description: 'Фильтр по model_name (подстрока, через пробел) или пусто = все'
        default: ''
        type: string
      family:
        description: 'Семейство из Sheets (MacBook/iMac/Mac mini/Mac Studio) или пусто'
        default: ''
        type: string
      max_pages:
        description: 'Макс. страниц на модель'
        default: '15'
        type: string
      clean:
        description: 'Пересоздать базу с нуля (--clean)'
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 115
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/price-builder/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scripts/price-builder/requirements.txt
          playwright install chromium --with-deps

      - name: Sync models from Google Sheets
        run: python scripts/sync-google-sheet.py

      - name: Run Price Builder v3
        env:
          RUCAPTCHA_API_KEY: ${{ secrets.RUCAPTCHA_API_KEY }}
        run: |
          cd scripts/price-builder
          MAX_PAGES="${{ github.event.inputs.max_pages || '15' }}"
          MODELS="${{ github.event.inputs.models }}"
          FAMILY="${{ github.event.inputs.family }}"
          CLEAN=""
          if [ "${{ github.event.inputs.clean }}" = "true" ]; then
            CLEAN="--clean"
          fi
          ARGS="--max-pages $MAX_PAGES --time-limit 100 $CLEAN"
          if [ -n "$MODELS" ]; then
            ARGS="$ARGS --models $MODELS"
          fi
          if [ -n "$FAMILY" ]; then
            ARGS="$ARGS --family $FAMILY"
          fi
          echo "Running: python builder.py $ARGS"
          python builder.py $ARGS

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/avito-prices.json public/data/avito-urls.json public/data/models-config.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update prices (builder v3) [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Retry $i..."
            git rebase --abort 2>/dev/null || true
            git fetch origin main
            git reset --soft origin/main
            git commit -m "chore: update prices (builder v3) [skip ci]"
          done
